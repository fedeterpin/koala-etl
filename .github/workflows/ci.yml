name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: koala
          POSTGRES_PASSWORD: koala
          POSTGRES_DB: koala_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U koala"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r backend/requirements-dev.txt
      - name: Lint
        run: ruff check backend worker
      - name: Tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://koala:koala@localhost:5432/koala_test
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
        working-directory: frontend
      - name: Typecheck + build
        run: npm run build
        working-directory: frontend
